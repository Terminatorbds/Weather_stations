apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station
spec:
  replicas: 10
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
        - name: weather-station
          image: weather-station:1.0
          imagePullPolicy: Never
          env:
            # Use the pod name as STATION_ID — unique per pod, stable for its lifetime
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: STATION_ID
              value: "$(POD_NAME)"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: KAFKA_BOOTSTRAP_SERVERS