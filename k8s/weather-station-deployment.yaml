# Headless Service — required by every StatefulSet. We don't use its DNS,
# but K8s requires it exists.
apiVersion: v1
kind: Service
metadata:
  name: weather-station-svc
spec:
  clusterIP: None
  selector:
    app: weather-station
  ports:
    - port: 80
      name: placeholder
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weather-station
spec:
  serviceName: weather-station-svc
  replicas: 10
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
        - name: weather-station
          image: weather-station:1.0
          imagePullPolicy: Never
          env:
            # Pod names will be weather-station-0 through weather-station-9
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: STATION_ID
              value: "$(POD_NAME)"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: KAFKA_BOOTSTRAP_SERVERS